# Pale Server — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# Generate strong secrets:
#   export PALE_SERVER_TOKEN=$(openssl rand -base64 32)
#   export PALE_ADMIN_PASSWORD=$(openssl rand -base64 32)
#   export PALE_STORAGE_KEY=$(openssl rand -base64 32)

services:
  pale-server:
    build:
      context: .
      dockerfile: Dockerfile.pale-server
    container_name: pale-server
    restart: unless-stopped
    ports:
      - "8080:8080"       # HTTP API
      - "5060:5060/udp"   # SIP UDP
      - "5061:5061"       # SIP TLS
    environment:
      PALE_HTTP_ADDR: "0.0.0.0:8080"
      PALE_SIP_ADDR: "0.0.0.0:5060"
      PALE_DATA_DIR: "/data"
      PALE_SERVER_TOKEN: "${PALE_SERVER_TOKEN:?Set PALE_SERVER_TOKEN (min 24 chars)}"
      PALE_ADMIN_PASSWORD: "${PALE_ADMIN_PASSWORD:?Set PALE_ADMIN_PASSWORD (min 24 chars)}"
      PALE_STORAGE_KEY: "${PALE_STORAGE_KEY:?Set PALE_STORAGE_KEY (min 24 chars)}"
      PALE_ADMIN_USERNAME: "${PALE_ADMIN_USERNAME:-admin}"
      PALE_SIP_BACKEND: "${PALE_SIP_BACKEND:-pjsip}"
      PALE_ICE: "${PALE_ICE:-true}"
      PALE_STUN_SERVERS: "${PALE_STUN_SERVERS:-stun:stun.l.google.com:19302}"
      PALE_STUN_IGNORE_FAILURE: "${PALE_STUN_IGNORE_FAILURE:-true}"
      PALE_SIP_SRTP: "${PALE_SIP_SRTP:-true}"
      PALE_MAX_UPLOAD_BYTES: "${PALE_MAX_UPLOAD_BYTES:-104857600}"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - pale-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pale-data:
    driver: local

name: Android Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Set NDK path
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            autoconf \
            automake

      # Cache PJSIP Android build
      - name: Cache PJSIP Android build
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target/aarch64-linux-android/release/build/pjsip-sys-*/out/pjproject-*
          key: pjsip-android-arm64-v2.14.1-${{ hashFiles('src-tauri/crates/pjsip-sys/build.rs') }}

      # Some transitive mobile dependencies still pull in openssl-sys. Keep a
      # static Android OpenSSL available until the graph is fully Rustls-only.
      - name: Build OpenSSL for Android aarch64
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          curl -sL https://github.com/openssl/openssl/releases/download/openssl-3.3.1/openssl-3.3.1.tar.gz | tar xz
          cd openssl-3.3.1
          ./Configure android-arm64 no-shared no-tests \
            --prefix=$HOME/openssl-android \
            -D__ANDROID_API__=24
          make -j$(nproc) > /dev/null 2>&1
          make install_sw > /dev/null 2>&1
          cd ..

          echo "OPENSSL_DIR=$HOME/openssl-android" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "AARCH64_LINUX_ANDROID_OPENSSL_DIR=$HOME/openssl-android" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npm run tauri android init

      - name: Add Android permissions and foreground service
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Insert permissions before the closing </manifest> tag
            sed -i '/<\/manifest>/i \
                <uses-permission android:name="android.permission.RECORD_AUDIO" />\
                <uses-permission android:name="android.permission.CAMERA" />\
                <uses-permission android:name="android.permission.INTERNET" />\
                <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\
                <uses-permission android:name="android.permission.WAKE_LOCK" />\
                <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
                <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL" />\
                <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\
                <uses-permission android:name="android.permission.VIBRATE" />\
                <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
                <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' "$MANIFEST"

            # Register the foreground service in the manifest (inside <application>)
            sed -i '/<\/application>/i \
                <service android:name="com.pale.softphone.SipForegroundService"\
                    android:foregroundServiceType="phoneCall"\
                    android:exported="false" />' "$MANIFEST"

            # Copy the Kotlin service source into the Android project
            JAVA_DIR="src-tauri/gen/android/app/src/main/java/com/pale/softphone"
            mkdir -p "$JAVA_DIR"
            cp src-tauri/android/SipForegroundService.kt "$JAVA_DIR/"

            echo "Android permissions and foreground service injected"
          fi

      - name: Build Android APK
        run: npm run tauri android build -- --target aarch64 --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_HOME }}
          PALE_ANDROID_CC: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          PALE_ANDROID_SYSROOT: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          PALE_ANDROID_TOOLCHAIN: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64

      # Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pale-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      # On tag push, attach to release
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: true

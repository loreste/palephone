name: Pale Server CI

on:
  push:
    branches: [main]
    paths:
      - "src-tauri/crates/pale-server/**"
      - "Dockerfile.pale-server"
      - "docker-compose.yml"
      - "packaging/windows/server/**"
      - ".github/workflows/pale-server.yml"
  pull_request:
    paths:
      - "src-tauri/crates/pale-server/**"
      - "packaging/windows/server/**"
      - ".github/workflows/pale-server.yml"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pale-server

jobs:
  test:
    name: Test pale-server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pale_test
          POSTGRES_USER: pale_test
          POSTGRES_PASSWORD: pale_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev libopus-dev uuid-dev pkg-config python3 nasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('src-tauri/crates/pale-server/Cargo.toml') }}

      - name: Run pale-server tests
        working-directory: src-tauri
        run: cargo test -p pale-server --lib

      - name: Build pale-server binary
        working-directory: src-tauri
        run: cargo build -p pale-server --bin pale-server

      - name: Smoke test against local binary
        env:
          PALE_SERVER_TOKEN: "ci-server-token-at-least-24chars"
          PALE_ADMIN_PASSWORD: "ci-admin-password-24chars-min"
          PALE_STORAGE_KEY: "ci-storage-key-24chars-xxxx"
          PALE_HTTP_ADDR: "127.0.0.1:18080"
          PALE_DATA_DIR: "/tmp/pale-ci-smoke-data"
          PALE_SIP_BACKEND: "udp-parser"
          PALE_REQUIRE_DUAL_ADMIN: "false"
          RUST_LOG: "warn"
        run: |
          rm -rf "$PALE_DATA_DIR"
          mkdir -p "$PALE_DATA_DIR"
          ./src-tauri/target/debug/pale-server &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf -H "User-Agent: Pale/ci" "http://127.0.0.1:18080/health" >/dev/null; then
              break
            fi
            sleep 1
          done
          export PALE_BASE_URL="http://127.0.0.1:18080"
          export PALE_SIP_URI="sip:admin@local"
          # Admin login is separate; create a user session via admin token first
          export PALE_ADMIN_TOKEN="$PALE_SERVER_TOKEN"
          # Smoke script expects user login — use server token path for API checks
          # Health + metrics at minimum:
          curl -sf -H "User-Agent: Pale/ci" "$PALE_BASE_URL/health"
          curl -sf -H "User-Agent: Pale/ci" "$PALE_BASE_URL/ready"
          curl -sf -H "User-Agent: Pale/ci" -H "Authorization: Bearer $PALE_SERVER_TOKEN" \
            "$PALE_BASE_URL/v1/admin/enterprise-integrations/validation.csv" | head -5
          echo "smoke ok"

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -p pale-server --lib --no-deps -- -W clippy::all
        continue-on-error: true

      - name: Test PostgreSQL migrations
        env:
          DATABASE_URL: postgres://pale_test:pale_test_password@localhost:5432/pale_test
        run: |
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/001_initial_schema.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/002_rooms_search_receipts_avatars.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/003_voicemail_recordings.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/004_dba_fixes.sql
          echo "All 4 migrations applied successfully"
          # Verify idempotency — run all migrations again
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/001_initial_schema.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/002_rooms_search_receipts_avatars.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/003_voicemail_recordings.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/004_dba_fixes.sql
          echo "Idempotency verified — all migrations re-applied without errors"

  docker:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pale-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  windows-installer:
    name: Build Windows server installer
    needs: test
    runs-on: windows-2022
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-pale-server-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Read pale-server version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path src-tauri/crates/pale-server/Cargo.toml -Pattern '^version = "(.+)"$'
          $version = $line.Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          if (Test-Path "C:\Program Files\NASM") {
            "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Build pale-server
        working-directory: src-tauri
        run: cargo build --release -p pale-server --bin pale-server --no-default-features

      - name: Stage installer inputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows-server | Out-Null
          Copy-Item src-tauri/target/release/pale-server.exe dist/windows-server/pale-server.exe
          Invoke-WebRequest `
            -Uri https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe `
            -OutFile dist/windows-server/PaleServerService.exe

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.version }}" packaging/windows/server/PaleServer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pale-server-windows-installer
          path: |
            dist/windows-server/PaleServerSetup-*.exe
            dist/windows-server/pale-server.exe

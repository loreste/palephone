name: Pale Server CI

on:
  push:
    branches: [main]
    paths:
      - "src-tauri/crates/pale-server/**"
      - "Dockerfile.pale-server"
      - "docker-compose.yml"
      - ".github/workflows/pale-server.yml"
  pull_request:
    paths:
      - "src-tauri/crates/pale-server/**"
      - ".github/workflows/pale-server.yml"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pale-server

jobs:
  test:
    name: Test pale-server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pale_test
          POSTGRES_USER: pale_test
          POSTGRES_PASSWORD: pale_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev pkg-config python3 nasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('src-tauri/crates/pale-server/Cargo.toml') }}

      - name: Run pale-server tests
        working-directory: src-tauri
        run: cargo test -p pale-server --lib

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -p pale-server --lib --no-deps -- -W clippy::all
        continue-on-error: true

      - name: Test PostgreSQL migrations
        env:
          DATABASE_URL: postgres://pale_test:pale_test_password@localhost:5432/pale_test
        run: |
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/001_initial_schema.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/002_rooms_search_receipts_avatars.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/003_voicemail_recordings.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/004_dba_fixes.sql
          echo "All 4 migrations applied successfully"
          # Verify idempotency — run all migrations again
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/001_initial_schema.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/002_rooms_search_receipts_avatars.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/003_voicemail_recordings.sql
          PGPASSWORD=pale_test_password psql -h localhost -U pale_test -d pale_test \
            -f src-tauri/crates/pale-server/migrations/004_dba_fixes.sql
          echo "Idempotency verified — all migrations re-applied without errors"

  docker:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pale-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

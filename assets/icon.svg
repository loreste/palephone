<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="180" y1="160" x2="332" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <g transform="translate(256, 256)">
    <!-- Signal arcs — three concentric arcs radiating from the handset -->
    <!-- Inner arc -->
    <path
      d="M -56,-80 A 96,96 0 0,1 56,-80"
      stroke="url(#shimmer)"
      stroke-width="3.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />
    <!-- Middle arc -->
    <path
      d="M -80,-110 A 136,136 0 0,1 80,-110"
      stroke="url(#shimmer)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
      opacity="0.35"
    />
    <!-- Outer arc -->
    <path
      d="M -100,-136 A 170,170 0 0,1 100,-136"
      stroke="url(#shimmer)"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.2"
    />

    <!-- Phone handset — larger, centered -->
    <path
      d="
        M -82,32
        C -82,32 -92,14 -92,-10
        C -92,-34 -78,-50 -58,-50
        L -34,-50
        C -27,-50 -22,-45 -22,-38
        L -22,-16
        C -22,-9 -27,-4 -34,-4
        L -46,-4
        C -51,-4 -54,-1 -54,4
        C -54,18 -36,42 0,58
        C 36,42 54,18 54,4
        C 54,-1 51,-4 46,-4
        L 34,-4
        C 27,-4 22,-9 22,-16
        L 22,-38
        C 22,-45 27,-50 34,-50
        L 58,-50
        C 78,-50 92,-34 92,-10
        C 92,14 82,32 82,32
      "
      fill="url(#accent)"
    />

    <!-- Earpiece highlight -->
    <ellipse
      cx="-56" cy="-34"
      rx="10" ry="5"
      fill="white"
      opacity="0.12"
      transform="rotate(-20, -56, -34)"
    />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep indigo to near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0A2E"/>
    </linearGradient>
    <!-- Accent gradient: indigo to violet (matches the app's accent palette) -->
    <linearGradient id="accent" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Soft glow behind the icon -->
    <radialGradient id="glow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <!-- Pale shimmer: a subtle lighter arc -->
    <linearGradient id="shimmer" x1="180" y1="160" x2="332" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <circle cx="256" cy="246" r="180" fill="url(#glow)"/>

  <!--
    Phone handset icon — minimal, geometric style.
    A classic phone receiver shape built from a smooth path.
    Centered in the square, slightly above center for visual balance.
  -->
  <g transform="translate(256, 240)">
    <!-- Outer ring: represents signal / connectivity — a broken circle arc -->
    <!-- Top-left arc -->
    <path
      d="M -80,-100 A 128,128 0 0,1 80,-100"
      stroke="url(#shimmer)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
      opacity="0.4"
    />
    <!-- Bottom-right arc -->
    <path
      d="M 80,100 A 128,128 0 0,1 -80,100"
      stroke="url(#shimmer)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
      opacity="0.25"
    />

    <!-- Phone handset -->
    <path
      d="
        M -70,28
        C -70,28 -78,12 -78,-8
        C -78,-28 -66,-42 -50,-42
        L -30,-42
        C -24,-42 -20,-38 -20,-32
        L -20,-14
        C -20,-8 -24,-4 -30,-4
        L -40,-4
        C -44,-4 -46,-2 -46,2
        C -46,14 -30,34 0,48
        C 30,34 46,14 46,2
        C 46,-2 44,-4 40,-4
        L 30,-4
        C 24,-4 20,-8 20,-14
        L 20,-32
        C 20,-38 24,-42 30,-42
        L 50,-42
        C 66,-42 78,-28 78,-8
        C 78,12 70,28 70,28
      "
      fill="url(#accent)"
    />

    <!-- Small highlight on the earpiece for depth -->
    <ellipse
      cx="-48" cy="-28"
      rx="8" ry="4"
      fill="white"
      opacity="0.15"
      transform="rotate(-20, -48, -28)"
    />
  </g>

  <!-- "PALE" wordmark below the icon -->
  <text
    x="256"
    y="390"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="52"
    letter-spacing="0.18em"
    fill="#E0E7FF"
    opacity="0.9"
  >PALE</text>

  <!-- Subtle tagline -->
  <text
    x="256"
    y="418"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="400"
    font-size="16"
    letter-spacing="0.12em"
    fill="#818CF8"
    opacity="0.5"
  >SOFTPHONE</text>
</svg>

# Copy to secrets.yaml (do not commit real secrets) and apply:
#   kubectl -n pale apply -f secrets.yaml
#
# Generate values with:
#   openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: pale-server-secrets
  namespace: pale
type: Opaque
stringData:
  PALE_SERVER_TOKEN: "REPLACE_WITH_MIN_24_CHAR_TOKEN"
  PALE_ADMIN_PASSWORD: "REPLACE_WITH_MIN_24_CHAR_PASSWORD"
  PALE_STORAGE_KEY: "REPLACE_WITH_MIN_24_CHAR_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_HEX_OR_URLSAFE_PASSWORD"
  TURN_SECRET: "REPLACE_WITH_TURN_SHARED_SECRET"
  # Optional LiveKit
  # PALE_LIVEKIT_API_KEY: "devkey"
  # PALE_LIVEKIT_API_SECRET: "secret-must-be-at-least-32-characters-long"
---
apiVersion: v1
kind: Secret
metadata:
  name: pale-tls
  namespace: pale
type: kubernetes
# Create with cert-manager or:
#   kubectl -n pale create secret tls pale-tls \
#     --cert=fullchain.pem --key=privkey.pem
data: {}

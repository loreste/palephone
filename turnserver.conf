# Pale TURN Server Configuration (coturn)
#
# Provides TURN relay for NAT traversal when direct peer-to-peer
# media connections fail (corporate firewalls, symmetric NAT, mobile).

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49152
max-port=65535

# Authentication
realm=pale.local
use-auth-secret
# Secret is set via command line --static-auth-secret flag in docker-compose

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint
lt-cred-mech

# Performance
total-quota=100
bps-capacity=0
stale-nonce=600

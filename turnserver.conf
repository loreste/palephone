# Pale TURN Server Configuration (coturn)
#
# Provides TURN relay for NAT traversal when direct peer-to-peer
# media connections fail (corporate firewalls, symmetric NAT, mobile).
#
# Production: pass --external-ip=<public-ipv4> via docker-compose.prod.yml
# and set PALE_TURN_SERVER to a client-reachable URI (not 127.0.0.1).

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49152
max-port=65535

# Authentication
realm=pale.local
use-auth-secret
# Secret is set via --static-auth-secret in docker compose
lt-cred-mech
fingerprint

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Performance
total-quota=100
bps-capacity=0
stale-nonce=600
